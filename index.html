<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Koino</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#13121A;min-height:100vh;font-family:Georgia,serif;color:#F2EFE9;overflow-x:hidden}
button{font-family:Georgia,serif;cursor:pointer;-webkit-appearance:none;appearance:none}

/* DYNAMIC ISLAND */
.di{position:fixed;top:12px;left:50%;transform:translateX(-50%);background:#1E1C2A;border-radius:22px;padding:9px 22px;display:flex;align-items:center;gap:7px;z-index:200;box-shadow:0 0 0 1px rgba(255,255,255,.10)}
.di-dot{width:7px;height:7px;border-radius:50%;background:#9D6FFF;box-shadow:0 0 10px #9D6FFF;animation:pulse 2.5s ease-in-out infinite}
.di-label{font-family:monospace;font-size:10px;letter-spacing:2px;color:#888}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4;transform:scale(.7)}}

/* SCREENS */
.screen{display:none;min-height:100vh;flex-direction:column;background:#13121A}
.screen.active{display:flex}

/* HOME */
#home{overflow-y:auto;padding-bottom:60px}
.home-header{padding:62px 24px 0;display:flex;align-items:flex-start;justify-content:space-between}
.k-logo{font-size:48px;font-weight:900;color:#F2EFE9;letter-spacing:-2px;line-height:1}
.k-star{font-size:18px;color:#A78BFA;display:inline-block;animation:spin 10s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.pro-badge{background:linear-gradient(135deg,#7C3AED,#5B21B6);padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;color:white;margin-top:6px}
.home-sub{padding:10px 24px 6px;font-size:16px;color:#888}
.hook-banner{margin:14px 24px 20px;padding:14px 18px;background:rgba(139,92,246,.12);border:1px solid rgba(139,92,246,.25);border-radius:18px;font-size:13px;color:#C4B5FD;line-height:1.5;font-style:italic}
.tabs-wrap{padding:0 20px 18px;overflow-x:auto;-webkit-overflow-scrolling:touch}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:8px;width:max-content}
.tab{padding:9px 18px;border-radius:24px;font-size:13px;font-weight:600;color:#888;background:#1E1C2A;border:1px solid rgba(255,255,255,.09);white-space:nowrap}
.tab.on{background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:white;border-color:transparent}
.section-label{padding:4px 24px 10px;font-size:11px;letter-spacing:2px;color:#555;text-transform:uppercase}
.cats{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.cat{display:flex;align-items:center;gap:16px;padding:18px;border-radius:22px;background:#1E1C2A;border:1px solid rgba(255,255,255,.09);cursor:pointer;-webkit-tap-highlight-color:transparent}
.cat:active{opacity:.8}
.emo{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0}
.cat-info{flex:1}
.cat-name{font-size:19px;font-weight:700;color:#F2EFE9;margin-bottom:4px}
.cat-desc{font-size:13px;color:#888;line-height:1.4}
.chevron{color:#4A4860;font-size:22px}

/* CARD SCREEN */
#cards{overflow:hidden;position:relative}
.c-header{display:flex;align-items:center;justify-content:space-between;padding:58px 20px 14px;flex-shrink:0}
.c-back{width:44px;height:44px;border-radius:50%;background:#1E1C2A;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:20px;color:#AAA;cursor:pointer;-webkit-tap-highlight-color:transparent}
.c-mid{text-align:center;flex:1;padding:0 12px}
.c-catname{font-size:20px;font-weight:700;color:#F2EFE9}
.c-subdesc{font-size:12px;color:#888;margin-top:3px}
.c-num{font-family:monospace;font-size:12px;color:#999;background:#1E1C2A;padding:7px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.10);flex-shrink:0}
.prog{padding:2px 20px 14px;flex-shrink:0}
.prog-bg{height:3px;background:rgba(255,255,255,.12);border-radius:2px}
.prog-fill{height:100%;background:linear-gradient(90deg,#8B5CF6,#C4B5FD);border-radius:2px;width:0%;transition:width .4s}

/* STACK */
.stack{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:0 20px;touch-action:pan-y}
.si{position:absolute;top:20px;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;z-index:20;transition:opacity .1s}
.si-l{left:24px;background:rgba(239,68,68,.95);color:white}
.si-r{right:24px;background:rgba(139,92,246,.95);color:white}

/* CARD */
.qcard{position:absolute;width:calc(100% - 40px);max-width:370px;min-height:400px;border-radius:28px;padding:32px 28px 28px;display:flex;flex-direction:column;box-shadow:0 24px 64px rgba(0,0,0,.5);overflow:hidden;cursor:grab;-webkit-user-select:none;user-select:none}
.qcard.c0{z-index:3}
.qcard.c1{z-index:2;transform:translateY(12px) scale(.95);opacity:.7;pointer-events:none}
.qcard.c2{z-index:1;transform:translateY(24px) scale(.90);opacity:.4;pointer-events:none}
.qcard.c1 .qcard-q,.qcard.c1 .qcard-emoji,.qcard.c1 .qcard-foot,
.qcard.c2 .qcard-q,.qcard.c2 .qcard-emoji,.qcard.c2 .qcard-foot{visibility:hidden}
.qcard.fly-left{z-index:4;transform:translateX(-130%) rotate(-18deg)!important;opacity:0;transition:transform .38s ease,opacity .38s}
.qcard.fly-right{z-index:4;transform:translateX(130%) rotate(18deg)!important;opacity:0;transition:transform .38s ease,opacity .38s}
.qcard-edition{font-family:monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:16px;text-transform:uppercase}
.qcard-emoji{font-size:38px;margin-bottom:18px;line-height:1}
.qcard-q{font-size:26px;font-weight:700;line-height:1.38;color:#F2EFE9;flex:1}
.qcard-foot{margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:space-between}
.qcard-hint{font-size:12px;color:rgba(255,255,255,.5);font-style:italic}
.qcard-swipe{font-family:monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1.5px}

/* ACTIONS */
.actions{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 20px 44px;flex-shrink:0}
.abtn{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:#1E1C2A;border:1px solid rgba(255,255,255,.12);color:#AAA;cursor:pointer;-webkit-tap-highlight-color:transparent}
.abtn:active{transform:scale(.88)}
.abtn-main{width:76px;height:76px;font-size:28px;background:linear-gradient(135deg,#8B5CF6,#6D28D9);border:none;color:white;box-shadow:0 8px 30px rgba(139,92,246,.6)}
.abtn-fav.faved{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#EF4444}

/* DONE */
.done-ov{position:absolute;inset:0;background:#13121A;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;z-index:30}
.done-ring{width:116px;height:116px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#6D28D9);display:flex;align-items:center;justify-content:center;font-size:50px;margin-bottom:28px}
.done-t{font-size:34px;font-weight:900;color:#F2EFE9;margin-bottom:10px}
.done-s{font-size:15px;color:#888;line-height:1.6;max-width:260px;margin-bottom:32px}
.done-b1{width:100%;max-width:300px;padding:16px;border-radius:16px;background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:white;font-size:16px;font-weight:700;border:none;margin-bottom:10px;cursor:pointer}
.done-b2{width:100%;max-width:300px;padding:15px;border-radius:16px;background:#1E1C2A;color:#AAA;font-size:15px;border:1px solid rgba(255,255,255,.12);cursor:pointer}

/* TOAST */
.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#2A2840;color:#F2EFE9;font-size:13px;padding:10px 22px;border-radius:20px;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap;border:1px solid rgba(255,255,255,.12)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

@keyframes slideIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}
</style>

</head>

// ── STATE ──────────────────────────────────────────
var state = {
  tab: 'marriage',
  cat: null,
  deck: [],
  idx: 0,
  history: [],
  favs: []
};

try { state.favs = JSON.parse(localStorage.getItem('kfavs') || '[]'); } catch(e) { state.favs = []; }

// ── UTILS ──────────────────────────────────────────
function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('on');
  setTimeout(function() { el.classList.remove('on'); }, 1800);
}

function showScreen(id) {
  document.getElementById('home').classList.remove('active');
  document.getElementById('cards').classList.remove('active');
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

// ── HOME ───────────────────────────────────────────
function renderHome() {
  // Tabs
  var tabsEl = document.getElementById('tabs');
  var tabHTML = '';
  for (var i = 0; i < TABS.length; i++) {
    var t = TABS[i];
    tabHTML += '<div class="tab' + (t.id === state.tab ? ' on' : '') + '" data-id="' + t.id + '">' + t.label + '</div>';
  }
  tabsEl.innerHTML = tabHTML;

  var tabEls = tabsEl.querySelectorAll('.tab');
  for (var i = 0; i < tabEls.length; i++) {
    tabEls[i].addEventListener('click', onTabClick);
  }

  // Hook
  document.getElementById('hook-banner').textContent = HOOKS[state.tab] || '';

  // Cats
  var list = D[state.tab] || [];
  document.getElementById('section-label').textContent = list.length + ' EDITIONS';
  var catsEl = document.getElementById('cats');
  var catHTML = '';
  for (var i = 0; i < list.length; i++) {
    var c = list[i];
    catHTML += '<div class="cat" data-id="' + c.id + '" style="animation:slideIn .28s ease ' + (i * 0.05) + 's both">' +
      '<div class="emo" style="background:' + c.bg + '">' + c.emoji + '</div>' +
      '<div class="cat-info"><div class="cat-name">' + c.name + '</div><div class="cat-desc">' + c.desc + '</div></div>' +
      '<div class="chevron">&#8250;</div></div>';
  }
  catsEl.innerHTML = catHTML;

  var catEls = catsEl.querySelectorAll('.cat');
  for (var i = 0; i < catEls.length; i++) {
    catEls[i].addEventListener('click', onCatClick);
  }
}

function onTabClick(e) {
  var id = e.currentTarget.getAttribute('data-id');
  state.tab = id;
  renderHome();
}

function onCatClick(e) {
  var id = e.currentTarget.getAttribute('data-id');
  var list = D[state.tab] || [];
  for (var i = 0; i < list.length; i++) {
    if (list[i].id === id) { openDeck(list[i]); return; }
  }
}

// ── DECK ───────────────────────────────────────────
function openDeck(cat) {
  state.cat = cat;
  state.deck = shuffle(cat.cards);
  state.idx = 0;
  state.history = [];
  document.getElementById('c-catname').textContent = cat.name;
  document.getElementById('c-subdesc').textContent = cat.desc;
  document.getElementById('done-ov').style.display = 'none';
  document.getElementById('fav-btn').className = 'abtn abtn-fav';
  document.getElementById('fav-btn').textContent = '♡';
  showScreen('cards');
  buildStack();
}

function buildStack() {
  var wrap = document.getElementById('stack');
  // Remove old cards
  var old = wrap.querySelectorAll('.qcard');
  for (var i = 0; i < old.length; i++) old[i].parentNode.removeChild(old[i]);

  var tot = state.deck.length;
  var cur = state.idx;

  document.getElementById('c-num').textContent = (cur + 1) + '/' + tot;
  document.getElementById('prog-fill').style.width = (cur / tot * 100) + '%';
  document.getElementById('undo-btn').style.opacity = state.history.length > 0 ? '1' : '0.3';

  // Add up to 3 cards (c2 bottom, c1 middle, c0 top)
  var max = Math.min(2, tot - cur - 1);
  for (var i = max; i >= 0; i--) {
    var card = makeCardEl(state.deck[cur + i]);
    card.className = 'qcard c' + i;
    wrap.appendChild(card);
  }

  // Attach swipe to top card
  var top = wrap.querySelector('.qcard.c0');
  if (top) attachSwipe(top);
}

function makeCardEl(card) {
  var cat = state.cat;
  var el = document.createElement('div');
  el.style.background = 'linear-gradient(160deg,' + cat.accent + 'EE 0%,' + cat.accent + '88 35%,' + cat.bg + ' 75%)';
  el.innerHTML =
    '<div class="qcard-edition">' + cat.name.toUpperCase() + ' &middot; KOINO</div>' +
    '<div class="qcard-emoji">' + cat.emoji + '</div>' +
    '<div class="qcard-q">' + (card.q || card) + '</div>' +
    '<div class="qcard-foot">' +
      '<div class="qcard-hint">' + (card.hint || '') + '</div>' +
      '<div class="qcard-swipe">SWIPE &#8594;</div>' +
    '</div>';
  return el;
}

// ── SWIPE ──────────────────────────────────────────
function attachSwipe(el) {
  var x0 = 0, y0 = 0, xd = 0, active = false, horiz = null;

  el.addEventListener('touchstart', function(ev) {
    x0 = ev.touches[0].clientX;
    y0 = ev.touches[0].clientY;
    xd = 0; active = true; horiz = null;
    el.style.transition = 'none';
  }, {passive:true});

  el.addEventListener('touchmove', function(ev) {
    if (!active) return;
    var dx = ev.touches[0].clientX - x0;
    var dy = ev.touches[0].clientY - y0;
    if (horiz === null) horiz = Math.abs(dx) > Math.abs(dy);
    if (!horiz) return;
    xd = dx;
    el.style.transform = 'translateX(' + xd + 'px) rotate(' + (xd * 0.07) + 'deg)';
    var sil = document.getElementById('si-l');
    var sir = document.getElementById('si-r');
    if (xd < -30) { sil.textContent = 'BACK'; sil.style.opacity = '' + Math.min(1,(Math.abs(xd)-30)/60); sir.style.opacity='0'; }
    else if (xd > 30) { sir.textContent = 'NEXT'; sir.style.opacity = '' + Math.min(1,(xd-30)/60); sil.style.opacity='0'; }
    else { sil.style.opacity='0'; sir.style.opacity='0'; }
  }, {passive:true});

  el.addEventListener('touchend', function(ev) {
    if (!active) return;
    active = false;
    el.style.transition = '';
    document.getElementById('si-l').style.opacity = '0';
    document.getElementById('si-r').style.opacity = '0';
    var d = xd; xd = 0;
    if (d < -80) doUndo();
    else if (d > 80) advance();
    else el.style.transform = 'translateX(0) rotate(0)';
  }, {passive:true});

  // Desktop mouse
  var md = false, mx0 = 0, mxd = 0;
  el.addEventListener('mousedown', function(ev) {
    md = true; mx0 = ev.clientX; mxd = 0;
    el.style.transition = 'none';
    ev.preventDefault();
  });
  window.addEventListener('mousemove', function(ev) {
    if (!md) return;
    mxd = ev.clientX - mx0;
    el.style.transform = 'translateX(' + mxd + 'px) rotate(' + (mxd * 0.07) + 'deg)';
  });
  window.addEventListener('mouseup', function(ev) {
    if (!md) return;
    md = false; el.style.transition = '';
    var d = mxd; mxd = 0;
    if (d < -80) doUndo();
    else if (d > 80) advance();
    else el.style.transform = 'translateX(0) rotate(0)';
  });
}

function advance() {
  var wrap = document.getElementById('stack');
  var top = wrap.querySelector('.qcard.c0');
  if (!top) return;

  state.history.push(state.idx);
  top.classList.add('fly-right');
  var dead = top;
  setTimeout(function() { if (dead.parentNode) dead.parentNode.removeChild(dead); }, 400);

  state.idx++;
  var tot = state.deck.length;

  if (state.idx >= tot) {
    document.getElementById('prog-fill').style.width = '100%';
    setTimeout(function() { document.getElementById('done-ov').style.display = 'flex'; }, 380);
    return;
  }

  document.getElementById('c-num').textContent = (state.idx + 1) + '/' + tot;
  document.getElementById('prog-fill').style.width = (state.idx / tot * 100) + '%';
  document.getElementById('undo-btn').style.opacity = '1';

  var c1 = wrap.querySelector('.qcard.c1');
  var c2 = wrap.querySelector('.qcard.c2');
  if (c1) { c1.classList.remove('c1'); c1.classList.add('c0'); attachSwipe(c1); }
  if (c2) { c2.classList.remove('c2'); c2.classList.add('c1'); }
  if (state.idx + 2 < tot) {
    var nc = makeCardEl(state.deck[state.idx + 2]);
    nc.className = 'qcard c2';
    var first = wrap.querySelector('.qcard');
    if (first) wrap.insertBefore(nc, first); else wrap.appendChild(nc);
  }
}

function doUndo() {
  if (state.history.length === 0) { toast('Already at the first card'); return; }
  state.idx = state.history.pop();
  buildStack();
  toast('Going back');
}

function doFav() {
  var card = state.deck[state.idx];
  if (!card) return;
  var key = card.q || String(state.idx);
  var btn = document.getElementById('fav-btn');
  var pos = state.favs.indexOf(key);
  if (pos > -1) {
    state.favs.splice(pos, 1);
    btn.className = 'abtn abtn-fav';
    btn.textContent = '♡';
    toast('Removed');
  } else {
    state.favs.push(key);
    btn.className = 'abtn abtn-fav faved';
    btn.textContent = '♥';
    toast('Saved ✦');
  }
  try { localStorage.setItem('kfavs', JSON.stringify(state.favs)); } catch(e) {}
}

// ── WIRE UP BUTTONS ────────────────────────────────
document.getElementById('back-btn').addEventListener('click', function() { showScreen('home'); renderHome(); });
document.getElementById('next-btn').addEventListener('click', advance);
document.getElementById('undo-btn').addEventListener('click', doUndo);
document.getElementById('fav-btn').addEventListener('click', doFav);
document.getElementById('restart-btn').addEventListener('click', function() {
  state.deck = shuffle(state.cat.cards);
  state.idx = 0; state.history = [];
  document.getElementById('done-ov').style.display = 'none';
  buildStack();
});
document.getElementById('home-btn2').addEventListener('click', function() { showScreen('home'); renderHome(); });

// ── START ──────────────────────────────────────────
renderHome();
</script>
