<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Koino</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=Outfit:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:#13121A;min-height:100vh;-webkit-text-size-adjust:100%}
body{font-family:'Outfit',system-ui,sans-serif;color:#F2EFE9;overflow-x:hidden}
div[onclick]{cursor:pointer}
button{-webkit-appearance:none;appearance:none;font-family:'Outfit',system-ui,sans-serif;cursor:pointer}

.screen{display:none;min-height:100vh;flex-direction:column;background:#13121A}
.screen.active{display:flex}

/* ── DYNAMIC ISLAND ── */
.di{
position:fixed;top:12px;left:50%;transform:translateX(-50%);
background:#1E1C2A;border-radius:22px;
padding:9px 22px;
display:flex;align-items:center;gap:7px;
z-index:200;box-shadow:0 0 0 1px rgba(255,255,255,.10);
min-width:110px;justify-content:center;
}
.di-dot{width:7px;height:7px;border-radius:50%;background:#9D6FFF;box-shadow:0 0 10px #9D6FFF;animation:dp 2.5s ease-in-out infinite;}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.4;transform:scale(.7)}}
.di-label{font-family:‘DM Mono’,monospace;font-size:10px;letter-spacing:2px;color:#888;}

/* ══ HOME ══ */
#home{overflow-y:auto;padding-bottom:60px}

.home-header{padding:62px 24px 0;display:flex;align-items:flex-start;justify-content:space-between;}
.k-logo{font-family:‘Playfair Display’,Georgia,serif;font-size:48px;font-weight:900;color:#F2EFE9;letter-spacing:-2px;line-height:1;display:flex;align-items:flex-start;}
.k-star{font-size:18px;color:#A78BFA;margin-left:2px;margin-top:5px;animation:spin 10s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg)}}
.pro-badge{display:flex;align-items:center;gap:4px;background:linear-gradient(135deg,#7C3AED,#5B21B6);padding:7px 14px;border-radius:20px;font-size:12px;font-weight:700;color:white;letter-spacing:.5px;box-shadow:0 4px 18px rgba(124,58,237,.45);margin-top:6px;}
.home-sub{padding:10px 24px 6px;font-size:16px;color:#888;font-weight:400;}

/* HOOK BANNER */
.hook-banner{
margin:14px 24px 20px;
padding:14px 18px;
background:linear-gradient(135deg,rgba(139,92,246,.15),rgba(99,102,241,.08));
border:1px solid rgba(139,92,246,.25);
border-radius:18px;
font-size:13px;
color:#C4B5FD;
line-height:1.5;
font-style:italic;
letter-spacing:.1px;
}

/* TABS */
.tabs-wrap{padding:0 20px 18px;overflow-x:auto;scrollbar-width:none;}
.tabs-wrap::-webkit-scrollbar{display:none}
.tabs{display:flex;gap:8px;width:max-content;}
.tab{
padding:9px 18px;border-radius:24px;
font-size:14px;font-weight:600;
color:#888;background:#1E1C2A;border:1px solid rgba(255,255,255,.09);
white-space:nowrap;transition:all .22s;
flex-shrink:0;
}
.tab.on{background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:white;border-color:transparent;box-shadow:0 4px 18px rgba(139,92,246,.4);}

/* SECTION LABEL */
.section-label{padding:4px 24px 10px;font-size:11px;font-weight:700;letter-spacing:2px;color:#555;text-transform:uppercase;}

/* CATEGORY ROWS */
.cats{padding:0 16px;display:flex;flex-direction:column;gap:10px}
.cat{display:flex;align-items:center;gap:16px;padding:18px;border-radius:22px;background:#1E1C2A;border:1px solid rgba(255,255,255,.09);transition:transform .15s;}
.cat:active{transform:scale(.98)}
.emo{width:58px;height:58px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:28px;flex-shrink:0;filter:drop-shadow(0 4px 8px rgba(0,0,0,.4));}
.cat-info{flex:1}
.cat-name{font-family:‘Playfair Display’,Georgia,serif;font-size:19px;font-weight:700;color:#F2EFE9;letter-spacing:-.3px;margin-bottom:4px;}
.cat-desc{font-size:13px;color:#888;line-height:1.4}
.cat-hook{font-size:11px;color:#7C3AED;font-style:italic;margin-top:4px;font-weight:500;}
.chevron{color:#4A4860;font-size:22px;font-weight:200}

/* ══ CARDS SCREEN ══ */
#cards{overflow:hidden;position:relative}
.c-header{display:flex;align-items:center;justify-content:space-between;padding:58px 20px 14px;flex-shrink:0;}
.c-back{width:44px;height:44px;border-radius:50%;background:#1E1C2A;border:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;font-size:20px;color:#AAA;flex-shrink:0;}
.c-mid{text-align:center;flex:1;padding:0 12px}
.c-catname{font-family:‘Playfair Display’,serif;font-size:20px;font-weight:700;color:#F2EFE9;letter-spacing:-.3px;}
.c-subdesc{font-size:12px;color:#888;margin-top:3px}
.c-num{font-family:‘DM Mono’,monospace;font-size:12px;color:#999;background:#1E1C2A;padding:7px 13px;border-radius:12px;border:1px solid rgba(255,255,255,.10);flex-shrink:0;}

.prog{padding:2px 20px 14px;flex-shrink:0}
.prog-t{height:3px;background:rgba(255,255,255,.12);border-radius:2px}
.prog-f{height:100%;background:linear-gradient(90deg,#8B5CF6,#C4B5FD);border-radius:2px;transition:width .4s}

.stack{flex:1;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:0 20px;}
.si{position:absolute;top:20px;padding:7px 16px;border-radius:20px;font-size:13px;font-weight:700;letter-spacing:.5px;opacity:0;transition:opacity .12s;pointer-events:none;z-index:20;}
.si-l{left:24px;background:rgba(239,68,68,.95);color:white}
.si-r{right:24px;background:rgba(139,92,246,.95);color:white}

.qcard{position:absolute;width:100%;max-width:370px;min-height:400px;border-radius:28px;padding:32px 28px 28px;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none;will-change:transform;box-shadow:0 24px 64px rgba(0,0,0,.5),0 0 0 1px rgba(255,255,255,.08);overflow:hidden;}
.qcard.c0{z-index:3;transform:translateX(0) rotate(0)}
.qcard.c1{z-index:2;transform:translateY(12px) scale(.95);opacity:.7;pointer-events:none}
.qcard.c2{z-index:1;transform:translateY(24px) scale(.90);opacity:.4;pointer-events:none}
.qcard.exit-l{z-index:4;transform:translateX(-130%) rotate(-18deg);opacity:0;transition:transform .38s ease,opacity .38s}
.qcard.exit-r{z-index:4;transform:translateX(130%) rotate(18deg);opacity:0;transition:transform .38s ease,opacity .38s}

.qcard.c1 .qcard-q,.qcard.c1 .qcard-emoji,.qcard.c1 .qcard-foot,
.qcard.c2 .qcard-q,.qcard.c2 .qcard-emoji,.qcard.c2 .qcard-foot{visibility:hidden;}

.qcard-edition{font-family:‘DM Mono’,monospace;font-size:9px;letter-spacing:2px;color:rgba(255,255,255,.4);margin-bottom:16px;text-transform:uppercase;}
.qcard-emoji{font-size:38px;margin-bottom:18px;filter:drop-shadow(0 6px 12px rgba(0,0,0,.3));line-height:1;}
.qcard-q{font-family:‘Playfair Display’,Georgia,serif;font-size:26px;font-weight:700;line-height:1.38;color:#F2EFE9;flex:1;letter-spacing:-.5px;}
.qcard-foot{margin-top:24px;padding-top:16px;border-top:1px solid rgba(255,255,255,.12);display:flex;align-items:center;justify-content:space-between;}
.qcard-hint{font-size:12px;color:rgba(255,255,255,.5);font-style:italic}
.qcard-swipe{font-family:‘DM Mono’,monospace;font-size:9px;color:rgba(255,255,255,.35);letter-spacing:1.5px}

.actions{display:flex;align-items:center;justify-content:center;gap:16px;padding:14px 20px 44px;flex-shrink:0;}
.abtn{width:58px;height:58px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:22px;background:#1E1C2A;border:1px solid rgba(255,255,255,.12);color:#AAA;transition:transform .15s;}
.abtn:active{transform:scale(.88)}
.abtn-main{width:76px;height:76px;font-size:28px;background:linear-gradient(135deg,#8B5CF6,#6D28D9);border:none !important;color:white;box-shadow:0 8px 30px rgba(139,92,246,.6);}
.abtn-fav.faved{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.35);color:#EF4444}

.done-ov{position:absolute;inset:0;background:#13121A;display:none;flex-direction:column;align-items:center;justify-content:center;padding:40px 28px;text-align:center;z-index:30;}
.done-ring{width:116px;height:116px;border-radius:50%;background:linear-gradient(135deg,#8B5CF6,#6D28D9);display:flex;align-items:center;justify-content:center;font-size:50px;margin-bottom:28px;box-shadow:0 20px 60px rgba(139,92,246,.6);}
.done-t{font-family:‘Playfair Display’,serif;font-size:34px;font-weight:900;color:#F2EFE9;margin-bottom:10px;letter-spacing:-.5px;}
.done-s{font-size:15px;color:#888;line-height:1.6;max-width:260px;margin-bottom:32px}
.done-b1{width:100%;max-width:300px;padding:16px;border-radius:16px;background:linear-gradient(135deg,#8B5CF6,#6D28D9);color:white;font-size:16px;font-weight:700;border:none;margin-bottom:10px;box-shadow:0 8px 24px rgba(139,92,246,.45);}
.done-b2{width:100%;max-width:300px;padding:15px;border-radius:16px;background:#1E1C2A;color:#AAA;font-size:15px;border:1px solid rgba(255,255,255,.12);}

.toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:#2A2840;color:#F2EFE9;font-size:13px;font-weight:500;padding:10px 22px;border-radius:20px;box-shadow:0 8px 24px rgba(0,0,0,.4);opacity:0;transition:all .3s;z-index:999;white-space:nowrap;border:1px solid rgba(255,255,255,.12);}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
</style>

</head>
<body>

<div class="di"><div class="di-dot"></div><div class="di-label">KOINO</div></div>

<!-- ══ HOME ══ -->

<div id="home" class="screen active">
  <div class="home-header">
    <div class="k-logo">Koino<span class="k-star">✦</span></div>
    <div class="pro-badge">💎 PRO</div>
  </div>
  <div class="home-sub">What are we exploring today?</div>
  <div class="hook-banner" id="hook-banner">Before you assume everything is fine — pick a deck.</div>

  <div class="tabs-wrap">
    <div class="tabs" id="tabs"></div>
  </div>

  <div class="section-label" id="section-label">EDITIONS</div>
  <div class="cats" id="cats"></div>
</div>

<!-- ══ CARDS ══ -->

<div id="cards" class="screen">
  <div class="c-header">
    <div class="c-back" onclick="goHome()">←</div>
    <div class="c-mid">
      <div class="c-catname" id="c-catname">Deep Insight</div>
      <div class="c-subdesc" id="c-subdesc">Take your time</div>
    </div>
    <div class="c-num" id="c-num">1/5</div>
  </div>
  <div class="prog"><div class="prog-t"><div class="prog-f" id="prog-f" style="width:0%"></div></div></div>
  <div class="stack" id="stack">
    <div class="si si-l" id="si-l">SKIP</div>
    <div class="si si-r" id="si-r">✓ NEXT</div>
  </div>
  <div class="actions">
    <div class="abtn" id="undo-btn" onclick="doUndo()">↩</div>
    <div class="abtn abtn-main" onclick="doSwipe('right')">→</div>
    <div class="abtn abtn-fav" id="fav-btn" onclick="doFav()">♡</div>
  </div>
  <div class="done-ov" id="done-ov">
    <div class="done-ring">✦</div>
    <div class="done-t">All done!</div>
    <p class="done-s">You've gone through all the cards. Sit with what came up.</p>
    <button class="done-b1" onclick="doRestart()">Shuffle &amp; Play Again</button>
    <button class="done-b2" onclick="goHome()">Back to Home</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
// KOINO DATA — FULLY REBUILT
// All audiences. Hook-matched questions. Deep editions.
// ══════════════════════════════════════════════════════
const TABS = [
  { id: 'marriage',    label: '💍 Marriage' },

const D = {

let activeTab = 'marriage';
let cat = null, deck = [], idx = 0, history = [];

// ══════════════════════════════════
// HOME RENDER
// ══════════════════════════════════
function renderTabs() {
  const el = document.getElementById('tabs');
  el.innerHTML = TABS.map(t => `
    <div class="tab${t.id === activeTab ? ' on' : ''}" data-id="${t.id}">${t.label}</div>
  `).join('');
  el.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeTab = tab.dataset.id;
      renderTabs();
      renderCats();
      updateHook();
    });
  });
}

function updateHook() {
  document.getElementById('hook-banner').textContent = HOOKS[activeTab] || '';
}

function renderCats() {
  const el = document.getElementById('cats');
  const list = D[activeTab] || [];
  document.getElementById('section-label').textContent = list.length + ' EDITIONS';
  el.innerHTML = list.map((c, i) => `
    <div class="cat" data-id="${c.id}" style="animation:fi .28s ease ${i * .05}s both">
      <div class="emo" style="background:${c.bg}">${c.emoji}</div>
      <div class="cat-info">
        <div class="cat-name">${c.name}</div>
        <div class="cat-desc">${c.desc}</div>
      </div>
      <div class="chevron">›</div>
    </div>
  `).join('');

  el.querySelectorAll('.cat').forEach(catEl => {
    let touchStartY = 0, touchMoved = false;
    catEl.addEventListener('touchstart', e => { touchStartY = e.touches[0].clientY; touchMoved = false; }, { passive: true });
    catEl.addEventListener('touchmove', e => { if (Math.abs(e.touches[0].clientY - touchStartY) > 8) touchMoved = true; }, { passive: true });
    catEl.addEventListener('touchend', e => { if (!touchMoved) { e.preventDefault(); openCat(catEl.dataset.id); } });
    catEl.addEventListener('click', () => openCat(catEl.dataset.id));
  });
}

function openCat(id) {
  const list = D[activeTab] || [];
  cat = list.find(c => c.id === id);
  if (!cat) return;
  if (!cat.cards?.length) { showToast('No cards yet'); return; }
  deck = shuf([...cat.cards]); idx = 0; history = [];
  document.getElementById('c-catname').textContent = cat.name;
  document.getElementById('c-subdesc').textContent = cat.desc;
  document.getElementById('done-ov').style.display = 'none';
  document.getElementById('fav-btn').className = 'abtn abtn-fav';
  document.getElementById('fav-btn').textContent = '♡';
  show('cards'); buildStack();
}

function goHome() { show('home'); }

// ══════════════════════════════════
// CARD STACK
// ══════════════════════════════════
function buildStack() {
  const wrap = document.getElementById('stack');
  wrap.querySelectorAll('.qcard').forEach(c => c.remove());
  const tot = deck.length;
  document.getElementById('c-num').textContent = `${idx + 1}/${tot}`;
  document.getElementById('prog-f').style.width = (idx / tot * 100) + '%';
  document.getElementById('undo-btn').style.opacity = history.length > 0 ? '1' : '0.3';

  for (let i = Math.min(2, tot - idx - 1); i >= 0; i--) {
    const el = makeCard(deck[idx + i]);
    el.classList.add('c' + i);
    wrap.appendChild(el);
  }
  const top = wrap.querySelector('.qcard.c0');
  if (top) attachSwipe(top);
}

function makeCard(card) {
  const el = document.createElement('div');
  el.className = 'qcard';
  el.style.background = `linear-gradient(160deg,${cat.accent}EE 0%,${cat.accent}88 35%,${cat.bg} 75%)`;
  el.innerHTML = `
    <div class="qcard-edition">${cat.name.toUpperCase()} · KOINO</div>
    <div class="qcard-emoji">${cat.emoji}</div>
    <div class="qcard-q">${card.q || card}</div>
    <div class="qcard-foot">
      <div class="qcard-hint">${card.hint || ''}</div>
      <div class="qcard-swipe">SWIPE →</div>
    </div>`;
  return el;
}

function attachSwipe(el) {
  let sx = 0, sy = 0, dx = 0, drag = false;
  const s = e => { sx = e.touches ? e.touches[0].clientX : e.clientX; sy = e.touches ? e.touches[0].clientY : e.clientY; drag = true; el.style.transition = 'none'; };
  const m = e => {
    if (!drag) return;
    dx = (e.touches ? e.touches[0].clientX : e.clientX) - sx;
    const dy = (e.touches ? e.touches[0].clientY : e.clientY) - sy;
    if (Math.abs(dx) > Math.abs(dy)) {
      if (e.cancelable) e.preventDefault();
      el.style.transform = `translateX(${dx}px) rotate(${dx * .07}deg)`;
      const l = document.getElementById('si-l'), r = document.getElementById('si-r');
      if (dx < -30) { l.textContent = '↩ BACK'; l.style.opacity = Math.min(1, (Math.abs(dx) - 30) / 60) + ''; r.style.opacity = '0'; }
      else if (dx > 30) { r.textContent = '✓ NEXT'; r.style.opacity = Math.min(1, (dx - 30) / 60) + ''; l.style.opacity = '0'; }
      else { l.style.opacity = '0'; r.style.opacity = '0'; }
    }
  };
  const e2 = () => {
    if (!drag) return; drag = false; el.style.transition = '';
    document.getElementById('si-l').style.opacity = '0';
    document.getElementById('si-r').style.opacity = '0';
    if (dx < -80) doUndo();
    else if (dx > 80) doSwipe('right');
    else el.style.transform = 'translateX(0) rotate(0)';
    dx = 0;
  };
  el.addEventListener('touchstart', s, { passive: true });
  el.addEventListener('touchmove', m, { passive: false });
  el.addEventListener('touchend', e2);
  el.addEventListener('mousedown', s);
  window.addEventListener('mousemove', m);
  window.addEventListener('mouseup', e2);
}

function doSwipe(dir) {
  const wrap = document.getElementById('stack');
  const top = wrap.querySelector('.qcard.c0');
  if (!top) return;
  history.push(idx);
  top.classList.remove('c0');
  top.classList.add(dir === 'left' ? 'exit-l' : 'exit-r');
  setTimeout(() => top.remove(), 420);
  idx++;
  const tot = deck.length;
  if (idx >= tot) { setTimeout(() => { document.getElementById('done-ov').style.display = 'flex'; }, 350); document.getElementById('prog-f').style.width = '100%'; return; }
  document.getElementById('c-num').textContent = `${idx + 1}/${tot}`;
  document.getElementById('prog-f').style.width = (idx / tot * 100) + '%';
  document.getElementById('undo-btn').style.opacity = '1';
  const c1 = wrap.querySelector('.qcard.c1'), c2 = wrap.querySelector('.qcard.c2');
  if (c1) { c1.classList.remove('c1'); c1.classList.add('c0'); attachSwipe(c1); }
  if (c2) { c2.classList.remove('c2'); c2.classList.add('c1'); }
  if (idx + 2 < tot) { const nc = makeCard(deck[idx + 2]); nc.classList.add('c2'); wrap.insertBefore(nc, wrap.querySelector('.qcard')); }
}

function doUndo() {
  if (history.length === 0) { showToast('Already at the first card'); return; }
  idx = history.pop();
  buildStack();
  showToast('↩ Going back');
}

function doFav() {
  if (!deck[idx]) return;
  const key = deck[idx].q || String(idx);
  const btn = document.getElementById('fav-btn');
  if (favs.includes(key)) { favs = favs.filter(f => f !== key); btn.className = 'abtn abtn-fav'; btn.textContent = '♡'; showToast('Removed'); }
  else { favs.push(key); btn.className = 'abtn abtn-fav faved'; btn.textContent = '♥'; showToast('Saved ✦'); }
  localStorage.setItem('k_favs', JSON.stringify(favs));
}

function doRestart() { deck = shuf([...cat.cards]); idx = 0; history = []; document.getElementById('done-ov').style.display = 'none'; buildStack(); }

// ══════════════════════════════════
// UTILS
// ══════════════════════════════════
function show(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); window.scrollTo(0, 0); }
function shuf(a) { for (let i = a.length - 1; i > 0; i--) { const j = 0 | Math.random() * (i + 1); [a[i], a[j]] = [a[j], a[i]]; } return a; }
function showToast(m) { const t = document.getElementById('toast'); t.textContent = m; t.classList.add('on'); setTimeout(() => t.classList.remove('on'), 2000); }

// INIT
renderTabs();
renderCats();
updateHook();
document.head.insertAdjacentHTML('beforeend', '<style>@keyframes fi{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:none}}</style>');

</script>
</body>
