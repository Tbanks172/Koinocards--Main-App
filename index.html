orb1:“radial-gradient(ellipse 70% 50% at 25% 20%,#A855F755 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#F0ABFC30 0%,transparent 60%)”,
accent:”#FAE8FF”,accentDim:”#F0ABFC”,glow:”#A855F7”,
cards:[
{text:“My body was made to carry life and it is doing so beautifully. I declare that every system in my body designed for conception and pregnancy is functioning in perfect divine order. God is the author of life, and He is authoring mine.”},
{text:“I release every fear about conception and I receive faith in its place. The statistics do not have the final word. The reports do not have the final word. God has the final word, and His word over my womb is life, fruitfulness, and abundance.”},
{text:“What God has promised me in this area, He will fulfill — in His timing, by His method, for His glory. I do not know the how. I do not know the when. But I know the Who, and that is enough to keep me anchored while I wait.”},
{text:“My womb is blessed, prepared, and ready to receive life. I speak peace and alignment over every part of my reproductive system. What God designed to work is working, and what has been hindered is being healed right now.”},
{text:“The waiting is not a denial. It is a divine appointment unfolding on a schedule I cannot see. What feels like a delay from where I stand looks entirely different from heaven. I trust the timing, even when I don’t understand it.”},
{text:“I am not barren — I am becoming. This season of waiting is not empty. It is full of preparation, of deepening, of God doing something in me that will make me ready for the miracle when it comes.”},
{text:“My body cooperates fully with the plans God has for my family. I declare alignment between my physical body and the will of God for my womb. Every hormone, every cycle, every biological process is subject to the authority of the Word of God.”},
{text:“I choose hope over statistics and faith over fear. The numbers are not my God. The doctors are not my God. They are tools in His hands, and He can work above, beyond, and through every limitation they name.”},
{text:“Every medical report must bow to a higher report. What is written in the medical file is subject to revision by the Author of life. I receive medical wisdom, and I also carry a faith that makes the impossible possible.”},
{text:“I trust the timing even when I don’t understand it. Some of the greatest gifts in my life came later than I expected and were far better than I imagined. I release my timeline and I receive His. He has never been late yet.”},
{text:“God is the author of life, and He is writing my family story with love, with intention, and with perfect detail. Every child He sends is appointed. Every season of preparation is purposeful. I trust the story He is writing.”},
{text:“I receive the promise of children with open hands and a believing heart. I hold the promise loosely, believing confidently, trusting completely in the One who authors life.”},
]},
{key:“carrying”,label:“While Carrying”,
bg:“linear-gradient(160deg,#831843 0%,#BE185D 35%,#EC4899 65%,#F9A8D4 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#EC489955 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#FBCFE835 0%,transparent 60%)”,
accent:”#FCE7F3”,accentDim:”#FBCFE8”,glow:”#EC4899”,
cards:[
{text:“My body is a safe, warm, and nurturing home for this child. Every environment my baby needs to grow and thrive is being perfectly maintained within me. I am a vessel of life, and I carry that responsibility with joy and with awe.”},
{text:“Every cell in me is working together in perfect harmony to bring forth life. I speak coordination and cooperation to every system in my body. My body knows what to do because God designed it — and His designs do not fail.”},
{text:“I speak peace, health, and strength over this pregnancy daily. I cover every trimester, every appointment, every scan in the name of Jesus. What I am carrying is covered by the blood of the covenant.”},
{text:“I am not afraid. My baby is covered in the secret place of the Most High, and no harm shall come near this pregnancy. Fear has no place in this womb and no place in my heart. I carry supernatural peace instead.”,ref:“Psalm 91:1”},
{text:“I release all anxiety about what I cannot control and I trust the God who can. I have done my part — I have taken care of myself, I have prayed, I have trusted. Now I rest in the hands of the One who forms every child in the womb.”},
{text:“My child is developing perfectly, fearfully, and wonderfully. Every organ, every nerve, every feature is being formed with divine precision. I speak development and health over every stage, from conception to delivery.”,ref:“Psalm 139:14”},
{text:“I nourish this life growing inside me with love, with prayer, and with the best care I can give. Every choice I make is an act of love for the person I am preparing to meet.”},
{text:“I am brave enough to bring this child into the world. Courage is not the absence of fear — it is the decision to proceed in spite of it. I am fully equipped for what is ahead. My body was designed for this.”},
{text:“This pregnancy is protected. Every scan carries good news. Every appointment confirms that all is well. I declare a covering of supernatural peace and divine protection over every medical interaction.”},
{text:“I speak joy, peace, purpose, and identity over the life within me. Before this child knows their name, they know they are loved. Before they draw their first breath in open air, they have been saturated in prayer and in faith.”},
{text:“I am becoming the mother my child deserves — not perfect, but present. Not fearless, but faithful. Not flawless, but fully committed. Every day of this pregnancy is making me more ready for the extraordinary human I am about to raise.”},
{text:“I am not alone in this pregnancy — I am partnered with the God who formed this child before I knew they were coming. He is invested in this outcome. He is watching over this pregnancy with a love that surpasses all understanding.”},
]},
{key:“newborn”,label:“Birth & New Life”,
bg:“linear-gradient(160deg,#7F1D1D 0%,#B91C1C 35%,#EF4444 65%,#FCA5A5 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#EF444455 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#FCA5A535 0%,transparent 60%)”,
accent:”#FEF2F2”,accentDim:”#FCA5A5”,glow:”#EF4444”,
cards:[
{text:“I will deliver with strength, with grace, and with the supernatural peace that only God can provide. My body was designed for this moment. My spirit has been prepared for this moment. I step into delivery knowing I am fully ready.”},
{text:“My child enters this world into a life of safety, unconditional love, and divine destiny. The world they are being born into is full of challenges — but they are arriving equipped, covered, and chosen for exactly this generation.”},
{text:“Birth is powerful and I am powerful. What is happening in my body is one of the most extraordinary things a human being can experience. I receive that power, I lean into it, and I trust my body to do what it was created to do.”},
{text:“I release every fear about labor and delivery and I receive supernatural courage and peace in its place. Pain is temporary. What is coming is permanent, and it is worth everything. I will not be overwhelmed — I will be carried through.”},
{text:“My body was designed for this moment. Every contraction is productive. Every wave is bringing my child closer. I work with my body rather than against it, trusting the intelligence that God built into the entire process.”},
{text:“I welcome my child into a life of abundance, purpose, faith, and great love. The atmosphere I have prepared for their arrival is one of joy. The home they are coming into is covered in prayer. They are the most wanted person in our world.”},
{text:“The days ahead with my child will be filled with a joy so deep it will take my breath away. The challenges will be real, but they will be small compared to the gift. I declare that the joy of this child exceeds every sacrifice it cost.”},
{text:“I am not alone in the delivery room — the God who formed this child is present, the angels of the Lord are attending, and the covenant promises of God are covering every person in that room. It is a holy moment.”},
{text:“My child’s arrival will be smooth, safe, and miraculous. Every person in that room will know that something beyond the medical is happening. I declare a testimony of the goodness of God written into the story of this birth.”},
{text:“I step into motherhood with grace, with confidence, and with the knowledge that the same God who trusted me with this child will equip me for every day of raising them. I am not doing this alone. I never was.”},
{text:“This baby is a gift the world has been waiting for. They carry an assignment that only they can fulfill. They arrived at this exact moment in history for a reason, and I am honored to be the one chosen to raise them.”},
{text:“A new chapter of my life begins now — and it is the most beautiful, most challenging, most rewarding chapter yet. I embrace everything that is coming. The sleeplessness, the wonder, the love that breaks every previous measurement.”},
]},
],
},
{
key:“health”,label:“Health & Wellness”,icon:“❍”,
cardGrad:“linear-gradient(135deg,#06521522,#6EE7B715)”,cardBorder:”#6EE7B740”,cardAccent:”#D1FAE5”,
subcategories:[
{key:“body”,label:“Physical Body”,
bg:“linear-gradient(160deg,#064E3B 0%,#065F46 35%,#059669 65%,#6EE7B7 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#05966955 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#6EE7B735 0%,transparent 60%)”,
accent:”#ECFDF5”,accentDim:”#6EE7B7”,glow:”#059669”,
cards:[
{text:“My body is the temple of the Holy Spirit and I treat it accordingly. What I eat, how I move, how I rest — all of it is an act of stewardship over a vessel that belongs to God. I will honor this body as the sacred dwelling place it is.”,ref:“1 Corinthians 6:19”},
{text:“I am healed by His stripes. Every sickness, every infirmity, every physical ailment was already addressed on the cross. I do not receive sickness as my permanent portion. Healing is the children’s bread, and I receive my portion today.”,ref:“Isaiah 53:5”},
{text:“Every organ, every cell, every system in my body is functioning in perfect divine order. I speak alignment and health to my nervous system, my immune system, my cardiovascular system — to every part of me, named and unnamed.”},
{text:“My body is strong, resilient, capable, and full of vitality. I declare that energy and strength are increasing in me daily. I wake up rested. I move through my day with stamina. I end my day with enough left to give to what matters most.”},
{text:“I choose foods, habits, and rhythms that honor the life I am building and the body I have been given. I am not on a diet — I am living a lifestyle of health that reflects the value I place on the vessel I have been trusted with.”},
{text:“Healing is flowing through my body right now. Whatever has been inflamed is cooling. Whatever has been blocked is opening. Whatever has been weakened is being strengthened. The healing power of God is actively at work in me.”},
{text:“Sickness has no permanent address in my body. It may visit, but it may not stay. I serve notice on every disease, every chronic condition, every persistent ailment — you are evicted by the authority of the Word of God.”},
{text:“My immune system is strong, intelligent, and deeply effective. It recognizes threats and eliminates them. I speak divine wisdom to my immune system and declare that it operates at its highest capacity.”},
{text:“Energy, strength, and vitality are increasing in me day by day. I am not declining. My body is being renewed even as it ages. I declare supernatural youth and strength over every system in me.”},
{text:“I move my body as an act of gratitude and worship. Exercise is not punishment — it is celebration. I celebrate what this body can do. I honor the gift of physical capacity. I move in a way that says, ‘I am grateful for this.’”},
{text:“I am getting stronger, healthier, and more vital every single day. The trajectory of my physical health is upward. What was broken is healing. What was weak is strengthening. What was sick is being restored.”},
{text:“Long life, full health, and complete physical strength are part of my covenant inheritance. I do not accept premature decline as my portion. I declare that I will live long, live well, and finish the race with full strength.”},
]},
{key:“mentalhealth”,label:“Mental Health”,
bg:“linear-gradient(160deg,#1E3A5F 0%,#1D4ED8 35%,#3B82F6 65%,#93C5FD 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#3B82F655 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#BFDBFE35 0%,transparent 60%)”,
accent:”#EFF6FF”,accentDim:”#93C5FD”,glow:”#3B82F6”,
cards:[
{text:“I have the mind of Christ — clarity that cuts through confusion, peace that outlasts circumstance, and the sound judgment of one who has been given divine wisdom. I operate from that mind today, not from anxiety, not from fear.”,ref:“1 Corinthians 2:16”},
{text:“I take every thought captive that exalts itself against the knowledge of God. My mind is not a democracy where every thought gets to cast a vote. I am the gatekeeper, and I decide what I allow to take up residence in my thinking.”,ref:“2 Corinthians 10:5”},
{text:“My mind is a garden and I tend it with great care. I am intentional about what I water, what I uproot, and what I plant. I remove thoughts of hopelessness, worthlessness, and defeat — and I plant truth in their place.”},
{text:“Anxiety does not rule my life. I name it when it comes. I refuse to let it make my decisions. The peace of God, which surpasses understanding, stands guard over my mind and my heart.”,ref:“Philippians 4:7”},
{text:“I am healing emotionally, mentally, and spiritually — from the inside out, layer by layer, at a pace that is exactly right for me. Healing is not a race. It is a journey, and I am committed to completing it.”},
{text:“I am not my worst thoughts. I am not the voice that tells me I am not enough. I am what I consistently choose — and I choose hope, I choose truth, I choose to believe that I am worthy of a life that is whole and full.”},
{text:“Rest is medicine, not laziness. I give myself full permission to stop, to sleep, to be still — without guilt, without the voice that says I should be doing more. A rested mind is more productive than an exhausted one.”},
{text:“I release the pressure to perform, to have it together, to appear fine when I am not. I give myself permission to be in process — to be healing, growing, and figuring it out. That is not weakness. That is one of the most honest things I can do.”},
{text:“I have the courage to seek help and the wisdom to receive it. Asking for support is not a failure — it is maturity. I use every resource available without shame, because wholeness is worth pursuing with everything I have.”},
{text:“My mind is being renewed daily by the Word of God, by truth, by community, and by the quiet work of the Holy Spirit. I am not who I was. The patterns of thinking that once owned me are losing their grip.”,ref:“Romans 12:2”},
{text:“I guard my mental space with the same intentionality I would guard my home. I am selective about what I consume, who I listen to, and what narratives I let in. My mind is sacred territory and I protect it accordingly.”},
{text:“Joy is returning to me in places it once left. The numbness is lifting. The heaviness is decreasing. Color is coming back into parts of my life that felt gray. I declare that the fullness of joy that belongs to me is being fully restored.”},
]},
{key:“wholeness”,label:“Wholeness”,
bg:“linear-gradient(160deg,#365314 0%,#4D7C0F 35%,#84CC16 65%,#D9F99D 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#84CC1655 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#D9F99D35 0%,transparent 60%)”,
accent:”#F7FEE7”,accentDim:”#D9F99D”,glow:”#84CC16”,
cards:[
{text:“I am becoming whole — spirit, soul, and body — and the wholeness I am building is not fragile. It is the deep integration of a person who has faced their wounds, named their pain, and chosen healing anyway.”},
{text:“I do not heal in a straight line and I extend full grace to myself in the process. Healing is not linear. There will be setbacks. That does not mean I am failing — it means I am in the middle of the process, which is exactly where I am supposed to be.”},
{text:“I deserve to feel well — genuinely, deeply well. Not just functional. Not just managing. Not just surviving. I deserve the kind of wellness that shows up in my energy, in my relationships, in my creativity, in my capacity for joy.”},
{text:“Wellness is not a destination I will one day arrive at. It is a daily act of love toward myself — the choices I make, the conversations I have, the boundaries I set, the rest I take. Wholeness is practiced, and I practice it today.”},
{text:“I am learning to listen to my body before it has to shout. The quiet signals — the fatigue, the tension, the restlessness — they are speaking and I am learning to hear them early, to respond with care before they escalate.”},
{text:“I release every habit, substance, relationship, and pattern that harms me — without shame and without condemnation. I do not hate myself for what I have used to cope. I release it because I deserve something better.”},
{text:“Sleep is sacred and I protect it without apology. When I sleep, my brain heals, my hormones reset, my creativity restores, and my capacity for love and patience rebuilds. Sleep is not the enemy of productivity — it is the foundation of it.”},
{text:“My emotional health is just as important as my physical health — and I give it the same level of attention, investment, and care. I process my feelings. I build emotional vocabulary. I take my inner life seriously.”},
{text:“I am not in a rush to heal. I am committed to healing completely — thoroughly, permanently, and in a way that doesn’t leave secret unhealed chambers that will leak into my future relationships. I heal all the way.”},
{text:“I choose the version of wellness that is honest, sustainable, and genuinely good for me — not the performative version that looks well on the outside while falling apart inside. Real wellness. Deep wellness. The kind that actually lasts.”},
{text:“Every part of me is being restored. The parts that were broken by trauma. The parts that were diminished by abuse. The parts that were neglected by my own hand. All of it — every corner, every hidden place — is being touched by the restoring hand of God.”},
{text:“I am whole — not because I have arrived at some perfect destination, but because I have decided to walk toward wholeness every day. The decision itself is the wholeness. And I make it again today, with intention and with hope.”},
]},
],
},
{
key:“marriage”,label:“Marriage”,icon:“∞”,
cardGrad:“linear-gradient(135deg,#86198F22,#F0ABFC15)”,cardBorder:”#E879F940”,cardAccent:”#FAE8FF”,
subcategories:[
{key:“covenant”,label:“Covenant & Commitment”,
bg:“linear-gradient(160deg,#3B0764 0%,#6D28D9 35%,#8B5CF6 65%,#C4B5FD 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#8B5CF655 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#DDD6FE35 0%,transparent 60%)”,
accent:”#EDE9FE”,accentDim:”#C4B5FD”,glow:”#8B5CF6”,
cards:[
{text:“My marriage is a covenant, not a contract. Contracts dissolve under pressure — covenants are refined by it. I choose my spouse today — not because everything is perfect, but because our covenant is bigger than any season we are walking through.”},
{text:“What God has joined together, no force in heaven, on earth, or in hell can separate. I declare a supernatural hedge of protection around my marriage. Every assignment against our union is dismantled by the authority of this covenant.”,ref:“Matthew 19:6”},
{text:“I choose my spouse again today — with clear eyes, with mature love, with full awareness of who they are, and with the settled decision that I am all in. Not because they are perfect. Because they are mine and I am theirs.”},
{text:“Our marriage is protected from every outside force — from the opinions of others, from the distractions that compete for our attention, from the enemy who would love nothing more than to reduce our covenant to a casualty.”},
{text:“I am committed to growing alongside my partner — not just in the same direction, but together. Checking in. Communicating. Adjusting. Making room for who we are both becoming. We grow together, and that growing together is the marriage.”},
{text:“We are better together than we ever were apart. The sum of us is greater than our individual parts. What we build together, who we become together, what we raise together — it is something neither of us could produce alone.”},
{text:“I speak life over my marriage even on the hard days — especially on the hard days. The days when I don’t feel it. Those are exactly the days when my words matter most.”},
{text:“Our love is not a feeling that comes and goes with our moods. It is a daily decision — a daily act of will that says: you are worth choosing again today. I make that decision right now, with no conditions attached.”},
{text:“I bring my best into this marriage, not just what’s left after I have given everything else away. My spouse deserves my attention when I still have it. My joy when it is still full. My presence when I am still present.”},
{text:“Our vows are not just words we said once at an altar — they are alive in this home, in the way we speak to each other, in the way we refuse to quit on each other. Our vows are a living thing.”},
{text:“I fight for my marriage, not with my spouse. The enemy of our union is not the person in front of me — it is the thing that is trying to get between us. I turn and face that thing together with my spouse, not against them.”},
{text:“Our union is a testimony that the world will witness. The way we love each other under pressure. The way we repair when we break. The way we build something real over decades. It will be evidence that God can build something beautiful.”},
]},
{key:“intimacy”,label:“Intimacy & Connection”,
bg:“linear-gradient(160deg,#500724 0%,#9D174D 35%,#EC4899 65%,#F9A8D4 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 25% 20%,#EC489955 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#FBCFE835 0%,transparent 60%)”,
accent:”#FCE7F3”,accentDim:”#FBCFE8”,glow:”#EC4899”,
cards:[
{text:“We are fully known to each other — deeply, safely, without the masks we wear for the rest of the world. In our marriage, we are seen. We are known. We are chosen anyway. That is the most extraordinary gift two people can give each other.”},
{text:“Vulnerability is not weakness in our marriage — it is the currency of our deepest connection. When I let my spouse see the parts of me I would rather hide, I give them the gift of the real me. And that is what they fell in love with.”},
{text:“We communicate with honesty, with grace, and with the sincere intention to understand each other — not to win, not to be right, but to actually connect. Understanding is our goal. Closeness is our reward.”},
{text:“I create a space in this marriage where my spouse is fully free to be themselves — to have their emotions, their opinions, their struggles, their dreams — without fear of judgment, without fear of rejection, without fear of losing me.”},
{text:“We do not allow unresolved conflict to become the wall between us. We address things. We repair things. We do not let the sun go down on a wound we could have dressed with honesty and humility today.”,ref:“Ephesians 4:26”},
{text:“Our emotional connection deepens with every season we walk through together. The hard seasons do not pull us apart — they press us together. We come out of every storm closer than we went in. That is who we are.”},
{text:“I listen to understand my spouse — not to respond, not to rebut, not to be heard first. I sit in the discomfort of truly listening until I actually understand what they are saying, what they are feeling, what they need from me.”},
{text:“Our marriage bed is sacred, pleasurable, and full of life. We protect our physical intimacy as part of our covenant — not as an obligation, but as one of the profound gifts we have been given to enjoy exclusively with each other.”},
{text:“We laugh together often. We forgive each other quickly. We love each other fiercely and without condition. Lightness and joy are not luxuries in our marriage — they are necessities, and we cultivate them deliberately.”},
{text:“I am my beloved’s and my beloved is mine. That exclusivity is not a restriction — it is the most beautiful kind of belonging. To belong fully to one person and to have them belong fully to you is a privilege I do not take for granted.”,ref:“Song of Solomon 6:3”},
{text:“We are best friends who chose each other. Beyond the romance, beyond the covenant — we genuinely like each other. We enjoy each other. We prefer each other’s company. That friendship is the foundation under everything else.”},
{text:“Our marriage grows richer with every challenge we overcome together. Difficulty deposits something into our shared account that nothing else can provide. We come out of every hard season with more trust, more depth, more appreciation.”},
]},
{key:“restoration”,label:“Restoration & Growth”,
bg:“linear-gradient(160deg,#1E3A5F 0%,#1E40AF 35%,#2563EB 65%,#93C5FD 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#2563EB55 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#BFDBFE35 0%,transparent 60%)”,
accent:”#EFF6FF”,accentDim:”#93C5FD”,glow:”#2563EB”,
cards:[
{text:“What has been damaged in our marriage can be fully restored. Not patched. Not managed. Restored — to a quality and depth that is actually better than what was there before. God specializes in this kind of restoration and I am asking for it.”},
{text:“I choose forgiveness — not because what happened was acceptable, not because it didn’t hurt, but because I want a marriage more than I want to be right. Forgiveness is the only path forward, and I choose it fully and without resentment.”},
{text:“We are not who we were. We are growing, maturing, and becoming better versions of ourselves — individually and together. The people we were when we started this marriage are not the people we are now. And the people we are becoming are better still.”},
{text:“Old wounds in our marriage are healing. What caused fractures before is losing its power to divide us. We are becoming more skilled at each other — more patient, more understanding, more capable of love that covers rather than exposes.”},
{text:“We seek wisdom together — from God, from counselors, from mentors who have walked this road before us. We are not too proud to ask for help. And every time we do, our marriage benefits from what we receive.”},
{text:“I release the right to be right. I choose peace over winning. I choose the marriage over my pride. I lay down the argument, the grievance, the need to have the last word — because I care more about us than I care about being justified.”},
{text:“God is at the center of our home. His peace is the atmosphere we cultivate. His wisdom is the foundation we build on. His love is the standard we hold each other to. Where He is central, everything else finds its proper place.”,ref:“Colossians 3:15”},
{text:“We do not give up on each other when things get hard. Hard seasons are not the end of the story — they are the middle. And the middle is where the character of a marriage is built. We stay. We work. We emerge stronger.”},
{text:“Our best days as a couple are still ahead of us. The richest chapters of our marriage — the deepest connection, the fullest trust, the most joyful seasons — have not been written yet. We are growing toward them together.”},
{text:“We use every tool available to us without shame — counseling, prayer, honest conversations, accountability, retreats. We are too committed to each other to let pride be the reason we don’t get the help we need.”},
{text:“We are the evidence that love can endure, be repaired, and emerge more beautiful than it was before. Our story is a testimony to every couple around us that staying and doing the work produces something worth having.”},
{text:“Our marriage is a living garden that we tend together. It requires water, sunlight, pruning, and protection. We give it all of those things — consistently, lovingly, and with the long view in mind. What we tend, flourishes.”},
]},
],
},
{
key:“mychild”,label:“My Child”,icon:“◇”,
cardGrad:“linear-gradient(135deg,#92400E22,#FCD34D15)”,cardBorder:”#FCD34D40”,cardAccent:”#FEF3C7”,
subcategories:[
{key:“identity_child”,label:“Identity & Worth”,
bg:“linear-gradient(160deg,#78350F 0%,#B45309 35%,#F59E0B 65%,#FCD34D 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#F59E0B55 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#FDE68A35 0%,transparent 60%)”,
accent:”#FFFBEB”,accentDim:”#FDE68A”,glow:”#F59E0B”,
cards:[
{text:“My child knows who they are and Whose they are. Before the world tells them what to think of themselves, my voice — and the voice of God — will have spoken loudest. They will stand in every room knowing they are chosen, loved, and equipped.”},
{text:“My child is fearfully and wonderfully made. There is nothing accidental about them — not their personality, not their quirks, not the things that make them different from everyone else. All of it was crafted with extraordinary intentionality.”,ref:“Psalm 139:14”},
{text:“My child walks in genuine confidence — not the fragile kind that depends on performance, but the deep kind that comes from knowing they are loved unconditionally. They do not need applause to believe in themselves.”},
{text:“My child knows they are deeply, completely, and unconditionally loved — by me and by God. That knowledge is the most protective thing I can give them. It is the armor they will wear into every battle the world brings their way.”},
{text:“No voice in this world will be loud enough to drown out the truth of my child’s worth. Not rejection. Not comparison. Not failure. Not cruelty. What God has spoken over them is louder than any lie, and they will know it.”},
{text:“My child stands firm in who they are, even under the intense pressure to be someone else. Identity rooted in God is not shaken by trends, by peers, or by the relentless pressure of culture to conform. My child is anchored.”},
{text:“My child is not defined by their mistakes. Their failures are not their identity — they are their education. They learn from their mistakes without being buried under them, because they know that grace is greater than any error they could make.”},
{text:“My child’s uniqueness is not a problem to be managed — it is a gift to be celebrated. Everything that makes them stand out from the crowd is not a liability. It is the very thing that will make them irreplaceable in the space they are called to occupy.”},
{text:“My child belongs — in every room, in every season, in every stage of life. They will never have to force their way in or minimize themselves to be accepted. They carry a belonging that is not conditional on performance or approval.”},
{text:“My child will never have to earn love. They already have it — fully, freely, without conditions. That truth will become the filter through which they interpret every relationship they walk into for the rest of their lives.”},
{text:“My child is growing in wisdom, in grace, in favor with God and with people. I declare a life of increasing influence, increasing capacity, and increasing impact — built on a foundation of deep character and genuine faith.”,ref:“Luke 2:52”},
{text:“My child is enough — exactly as they are, right now, in this exact season of their development. Not when they achieve more. Not when they improve. Right now, as they are, they are enough — and I will tell them that every single day.”},
]},
{key:“protection”,label:“Protection & Safety”,
bg:“linear-gradient(160deg,#0C4A6E 0%,#075985 35%,#0284C7 65%,#7DD3FC 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#0284C755 0%,transparent 65%)”,

accent:”#F0F9FF”,accentDim:”#BAE6FD”,glow:”#0284C7”,
cards:[
{text:“My child is surrounded by the angels of the Lord on every side — going to school, coming home, in their bedroom, on the playground, online, and in every space I can see and every space I cannot.”,ref:“Psalm 91:11”},
{text:“No weapon formed against my child — physical, spiritual, emotional, or relational — shall prosper. Every assignment of the enemy against their life, their health, their mind, their future is cancelled by the authority of the blood of Jesus.”,ref:“Isaiah 54:17”},
{text:“My child is protected in the streets, in their school, in their friendships, and in every space their feet carry them. They are not walking alone. They are escorted by the living God, who is fully committed to their safe passage through this world.”},
{text:“I cover my child in prayer every morning before they leave and every evening when they return. My prayers are not decorative words — they are a spiritual covering that travels with my child wherever they go.”},
{text:“My child is hidden in the secret place of the Most High. They dwell under the shadow of the Almighty — permanently. That shadow is their daily residence, and no evil can reach them there without going through God first.”},
{text:“Every plan of the enemy against my child’s mind, body, destiny, and relationships is dismantled right now in the name of Jesus. The assignments are cancelled. The traps are revealed. The schemes are frustrated.”},
{text:“My child comes home safely — every time, without exception. The God who numbers the hairs on their head is the same God who orders their steps, and who brings them back to safety every single time they leave.”},
{text:“My child is surrounded by friends who are genuinely good for them — friends who build them up, who hold them accountable, who reflect their values, and who are safe. I declare divine alignment over my child’s social world.”},
{text:“I release my child into the world each day knowing that they are never alone, never without protection, and never outside the reach of a God who is fully present with them in every moment I am not.”},
{text:“My child is shielded from every evil — the obvious and the hidden, the physical and the spiritual. God knows every threat before it forms, and He moves on my child’s behalf before I even know to pray about it.”},
{text:“I intercede for my child with authority, with faith, and with the confidence of a parent who knows they are praying to a Father who loves my child even more than I do. My intercession is powerful, and God hears every word.”},
{text:“The blood of Jesus covers my child going out and coming in, from this time forth and forevermore. That covering does not expire. It does not diminish. It is a permanent, supernatural protection that no force in creation can override.”},
]},
{key:“destiny_child”,label:“Destiny & Future”,
bg:“linear-gradient(160deg,#2E1065 0%,#5B21B6 35%,#7C3AED 65%,#A78BFA 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#7C3AED55 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#DDD6FE35 0%,transparent 60%)”,
accent:”#EDE9FE”,accentDim:”#C4B5FD”,glow:”#7C3AED”,
cards:[
{text:“My child has a purpose that will unfold beautifully and in perfect timing. What God placed in them before they were born is too specific to miss, too important to abandon, and too powerful to be stopped. Their assignment will be completed.”},
{text:“The gifts inside my child will make room for them in places that money, connections, and credentials alone could never open. What is in them is too distinctive to be ignored, and the right people will recognize it and make space for it.”,ref:“Proverbs 18:16”},
{text:“My child’s future is brighter than anything I can currently imagine for them. My greatest hope for them is still a fraction of what God has planned. I release my ceiling on their future and I invite God’s version — which is always better.”},
{text:“My child will walk in favor in every environment they enter. Favor in their classroom. Favor in their workplace. Favor in their city. Favor with the people who have the power to open the doors their destiny requires.”},
{text:“Doors will open for my child that have never opened for anyone before them. They will walk into rooms that required their exact combination of gifts, story, and calling to enter. Those doors are being prepared for them right now.”},
{text:“My child will impact their generation in a way that only they can. There is a gap in the world that is exactly their shape, and when they step into it, the fit will be so perfect that everyone around them will recognize they were made for it.”},
{text:“My child is a solution to a problem the world doesn’t even know it has yet. Their assignment is ahead of its time. What they carry is prophetic — sent into the future before the need was visible, ready to meet it when the moment arrives.”},
{text:“My child will exceed every ceiling I never broke through. The limitations I lived with are not inherited by them. My child stands on my shoulders and reaches heights I could only dream of. That is not my failure — it is my legacy.”},
{text:“My child carries the anointing of their lineage and the specific grace of their generation. They are the best of everything that came before them, deployed into the most strategic moment of human history.”},
{text:“My child is a leader — by example, by character, by the quiet authority that comes from someone who actually believes what they say and lives what they preach. People will follow them because they are worth following.”},
{text:“My child will love God with everything they have, serve people with everything they are, and leave a legacy that echoes long past their own lifetime. That is my declaration, my prayer, and my deepest hope for them.”},
{text:“The best of my child’s life is ahead of them. Not behind them in some golden past. Ahead — unwritten, full of possibility, and being prepared by a God who is exceptionally good at futures.”},
]},
],
},
{
key:“purpose”,label:“Purpose & Calling”,icon:“▲”,
cardGrad:“linear-gradient(135deg,#B4530022,#FDBA7415)”,cardBorder:”#FB923C40”,cardAccent:”#FED7AA”,
subcategories:[
{key:“calling”,label:“Your Calling”,
bg:“linear-gradient(160deg,#431407 0%,#9A3412 35%,#EA580C 65%,#FB923C 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#EA580C55 0%,transparent 65%)”,

accent:”#FFF7ED”,accentDim:”#FED7AA”,glow:”#EA580C”,
cards:[
{text:“I was called before I was formed — before I had a name, before I had a body, before the world knew I was coming. The call on my life is not a response to my qualifications. It is the reason I was created. I answer it today.”,ref:“Jeremiah 1:5”},
{text:“My calling is not contingent on my past, my failures, my limitations, or my current circumstances. It was issued by someone who knew all of those things before He called me, and He called me anyway. That call is irrevocable.”},
{text:“I answer the call on my life without waiting to feel ready, without waiting for perfect conditions, and without waiting for the fear to leave. Readiness is built in the doing. I go, and I build readiness as I move forward.”},
{text:“I am anointed for this exact assignment in this exact season. Not a general anointing for some future time — a specific, present, and fully activated anointing for the thing that is in front of me right now. I operate in it without apology.”},
{text:“My calling is specific, irreplaceable, and urgently needed. There is no one who can substitute for me. The world is waiting for what I specifically carry, and every day I delay is a day that the gap goes unfilled. I go now.”},
{text:“I do not shrink from the size of what I have been called to. Big callings are uncomfortable. They require more than I have, more than I know, and more than I can see. That is not a problem — that is a divine invitation to trust.”},
{text:“I was not called to fit in with the crowd or to be comfortable in the mainstream. I was called to stand in a specific place, carry a specific thing, and be uncompromisingly myself while I do it. I embrace that distinction without apology.”},
{text:“The vision I carry is real. It was not manufactured by my ambition — it was deposited by the God who entrusted it to me. It will come to pass. I write it down. I run toward it. I do not give up when it is slow.”,ref:“Habakkuk 2:3”},
{text:“I run my race with full focus and with deliberate disregard for the lanes beside me. My pace is not their pace. My finish line is not their finish line. I am running something specific and I give it everything I have.”,ref:“Hebrews 12:1”},
{text:“My assignment has a deadline and I steward it with the appropriate urgency. There is a generation waiting for what I carry. There is a need that my delay leaves unmet. I will not be found to have buried the talent I was given.”},
{text:“Purpose is not merely what I do — it is who I am becoming in the doing of it. The assignment transforms the person. I embrace the calling not just for what it produces, but for who it makes me in the process.”},
{text:“I will not leave this earth before I have delivered everything I was sent here with. Every book, every business, every conversation, every act of courage that was assigned to me — I will deliver it all before I finish my race.”},
]},
{key:“gifts”,label:“Gifts & Talents”,
bg:“linear-gradient(160deg,#7C2D12 0%,#C2410C 35%,#F97316 65%,#FDBA74 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#F9731655 0%,transparent 65%)”,

accent:”#FFF7ED”,accentDim:”#FDBA74”,glow:”#F97316”,
cards:[
{text:“My gifts make room for me in spaces that credentials alone cannot open. There is a quality and distinctiveness to what I carry that is not manufactured — it was given. And what God gives, He also makes a way for.”,ref:“Proverbs 18:16”},
{text:“I develop what I have been given with discipline, devotion, and the kind of daily faithfulness that is invisible to others but transformative to me. I am the kind of person who practices. Who improves. Who takes their gifts seriously.”},
{text:“Every talent I carry was placed in me deliberately. It is not an accident that I am good at this. It is not a coincidence that this comes naturally to me. It was designed — and the design has a purpose attached to it.”},
{text:“I do not hide what I have been given to protect the comfort of people who are threatened by it. My gifts are not mine to withhold. They were given to me to be given through me, and I will not let insecurity make me a hoarder.”},
{text:“My creativity is an expression of the Creator who lives in me. When I create, I am not performing — I am participating in the nature of a God who is endlessly creative, endlessly generative, and endlessly delighted by beauty.”},
{text:“I am uniquely gifted for a unique assignment. The specific combination of what I carry — my gifts, my story, my perspective, my personality — is not duplicated anywhere else on earth. I am the only version of this gift in existence.”},
{text:“I will not bury my talent through fear, through comparison, or through the voice that says it is not good enough. I will multiply it — through practice, through deployment, through the faithful and bold use of what I have been given.”,ref:“Matthew 25:29”},
{text:“The world genuinely benefits when I operate in my gifts fully and without apology. I am not doing the world any favors by staying small. My gifting is someone else’s breakthrough, and I have a responsibility to show up.”},
{text:“I am excellent at what I do because excellence is not merely a professional standard — it is an act of worship. Whatever I do, I do it with everything I have, as unto God, because He deserves my best and so do the people I serve.”},
{text:“My gifts are growing, sharpening, and attracting the kind of attention that opens the right doors. What I carry today is not the ceiling of what I will carry tomorrow. I am in a season of accelerated development.”},
{text:“I carry things inside me that cannot be replicated by technology, replaced by AI, or substituted by anyone else. The specifically human, specifically me dimensions of my gifting are irreplaceable. I lean into that with confidence.”},
{text:“What I create carries the fingerprint of God on it — a quality of life, meaning, and truth that people can feel even when they cannot explain it. I create from that place, and what I release makes people feel more alive.”},
]},
{key:“courage”,label:“Courage to Step Out”,
bg:“linear-gradient(160deg,#1A2E05 0%,#3F6212 35%,#65A30D 65%,#BEF264 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#65A30D55 0%,transparent 65%)”,
orb2:“radial-gradient(ellipse 55% 55% at 80% 80%,#D9F99D35 0%,transparent 60%)”,
accent:”#F7FEE7”,accentDim:”#D9F99D”,glow:”#65A30D”,
cards:[
{text:“I step out even when I cannot see the full staircase. The next step being visible is enough. I do not need the full picture before I move. I need clarity for today’s obedience, and I have it. I go.”},
{text:“Fear is information, not instruction. It tells me what matters, not what to do. I feel the fear, I note what it is telling me, and then I move forward anyway — because calling is louder than fear when I choose to listen.”},
{text:“Courage is not what I wait to feel before I act. It is what I build by acting. Every step I take toward my calling in the presence of fear deposits more courage in me for the next step. I go first. I build courage as I move.”},
{text:“The doors I knock on will open. Not every door I ever knocked on — but the right doors, at the right time, with the right preparation. I declare that I am moving toward those doors with boldness and with expectation.”},
{text:“I launch. I begin. I release. I go. I stop waiting for the perfect moment, the perfect version, the perfect plan. Perfect is the enemy of done, and done changes lives. I release what I have and trust God to do what I cannot.”},
{text:“Obedience to my calling requires action, and I take it — today, with what I have, from where I stand. I do not wait for more resources, more confidence, more favorable conditions. I start now and I trust the rest to follow.”},
{text:“I am not paralyzed by perfectionism. I release good things into the world knowing they will get better with time and with use. The version that exists and is imperfect is more powerful than the perfect version that never launches.”},
{text:“The discomfort I feel at the edge of my calling is not a signal to retreat — it is evidence that I am exactly where growth happens. I lean into it. I stretch into it. I become in it the person who was always on the other side of it.”},
{text:“I have done hard things before. I have stepped into the unknown before. I have been afraid before and done it anyway. I can point to every time I went anyway as evidence that I have what it takes for this moment too.”},
{text:“Nothing about my destiny is accidental — including this exact moment of decision, this exact tension between staying comfortable and stepping forward. I was always going to arrive here, and I was always going to choose to go. I go.”},
{text:“I choose courageous action over comfortable inaction every time — not because it is easy, but because I know that on the other side of this specific act of courage is the breakthrough I have been praying for.”},
{text:“I am built for this. I was prepared for this. Every season that came before this moment was training for it. I step forward fully equipped, fully anointed, and fully convinced that the God who called me is going with me.”},
]},
],
},

cards:[
{text:“I have the favor of God and the favor of men — and that favor is not circumstantial. It does not depend on my performance on any given day. It was declared over my life by a God who does not revoke His gifts, and it is active right now.”,ref:“Luke 2:52”},
{text:“Favor is not fair — and I am deeply grateful for that. It does not go to the most qualified or the most deserving. It goes to the chosen. And I have been chosen by a God who delights in confounding every human expectation of who should advance.”},
{text:“I walk into rooms and the atmosphere shifts. Doors that were closed before my arrival are opened. Conversations change direction. People become unusually helpful. That is not coincidence — that is the favor of God in operation.”},
{text:“People in positions of influence and authority are being moved — supernaturally positioned — to open doors for me that I could never have opened through networking, strategy, or persistence alone. God is moving people on my behalf right now.”},
{text:“What would take others years is being done in me in months. I am experiencing divine acceleration — not because I am more deserving, but because God’s timing for my assignment has shifted into a higher gear and He is moving things to match it.”},
{text:“I am the head and not the tail, above only and not beneath. That is not arrogance — it is a covenant declaration. I was designed for the front, for elevation, for influence. I walk in that truth with humility and with full conviction.”,ref:“Deuteronomy 28:13”},
{text:“Uncommon favor is following me into every new territory I enter. The markets I am entering, the rooms I am walking into — they all carry the fingerprint of a God who has been there before me, preparing the way.”},
{text:“I am highly favored, and the goodness of God is pursuing me. It is not something I am chasing — it is chasing me. Goodness and mercy are following me every single day of my life, in every environment I occupy.”,ref:“Psalm 23:6”},
{text:“Divine connections are being orchestrated on my behalf right now. Someone I have not yet met is being moved toward me. A conversation that will change everything is being arranged. I remain available, prepared, and expectant.”},
{text:“I am a candidate for a miracle every single day. The God I serve is not reluctant to interrupt the natural order of things for the sake of someone He loves. I live with the daily expectation that something extraordinary could happen at any moment.”},
{text:“Favor surrounds me like a shield — on every side, in every direction, against every opposition. What comes against me cannot penetrate it. What I walk toward is already softened by it. I live inside a force field of divine favor.”,ref:“Psalm 5:12”},
{text:“I am experiencing supernatural acceleration in every area of my life — in my business, in my relationships, in my spiritual development, in my finances. What should have taken longer is happening faster, because God is adding His speed to my effort.”},
]},
{key:“open_doors”,label:“Open Doors”,
bg:“linear-gradient(160deg,#1C1917 0%,#57534E 35%,#A8A29E 65%,#E7E5E4 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#A8A29E55 0%,transparent 65%)”,

accent:”#FAFAF9”,accentDim:”#E7E5E4”,glow:”#A8A29E”,
cards:[
{text:“Doors are opening for me that no human can shut. Not my competitors, not my critics, not the people who counted me out. When God opens a door, it does not close until the assignment inside it is complete.”,ref:“Revelation 3:8”},
{text:“I walk through every open door with boldness, with preparation, and with the confidence of someone who was expected. I do not sneak through uncertain of whether I belong. I enter fully prepared to deliver everything I was sent to deliver.”},
{text:“The right opportunity is finding me right now — not a good opportunity, not a convenient opportunity, but the right one. The one that is specifically shaped for what I carry. It is already in motion, already on its way.”},
{text:“I am being strategically placed in front of the right people — the ones with resources, the ones with platforms, the ones with the authority to say yes to things that would take my assignment to the next level. Those meetings are being arranged.”},
{text:“Contracts, deals, partnerships, and collaborations are flowing in my direction. The business God has destined for me to receive is being directed to me by a God who controls where things flow.”},
{text:“Every closed door was a divine redirection, not a final rejection. What I thought I wanted was not the full picture. What God allowed to close was making space for something better. I release every closed door and receive what it made room for.”},
{text:“I am positioned for a breakthrough that nothing can stop. Not timing, not competition, not my own history, not the enemy’s opposition. A breakthrough ordained before I was born is arriving now, and I am ready to receive it.”},
{text:“The next door that opens for me will be the most significant one yet. It will represent a level of opportunity, influence, and impact that I have been building toward. I am standing at the threshold, and it is about to open.”},
{text:“I am standing at the threshold of something I have never experienced before — a level of opportunity, provision, and divine favor that is unlike anything in my past. I step toward it with faith, with preparation, and with great expectation.”},
{text:“New markets, new territories, new relationships, and new levels of influence are opening to me. I am not limited to what I have accessed before. God is expanding my territory and giving me the capacity to occupy the new ground.”},
{text:“I walk in faith toward every door I feel led to knock on — without needing to know in advance whether it will open. I knock faithfully and I trust the One who decides what opens.”},
{text:“My season of breakthrough has begun. It is not coming — it has started. What I am seeing right now are the early signs of a shift that will become undeniable. I declare that it is already in motion and it cannot be reversed.”},
]},
{key:“promotion”,label:“Promotion”,
bg:“linear-gradient(160deg,#14532D 0%,#15803D 35%,#22C55E 65%,#86EFAC 100%)”,
orb1:“radial-gradient(ellipse 70% 50% at 20% 20%,#22C55E55 0%,transparent 65%)”,

cards:[
{text:“Promotion comes from the Lord and it is coming to me — not from the most impressive person in the room, not from the most connected, but from the God who raises up whom He will and places them where He will.”,ref:“Psalm 75:6-7”},
{text:“I am being elevated to levels I was genuinely built for. Not levels I stumbled into. Not levels I performed my way into. Levels that match the depth of who I actually am, the weight of what I actually carry.”},
{text:“My advancement is overdue in the natural and arriving suddenly in the supernatural. What looked like delay was preparation. What felt like being overlooked was being refined. And what is arriving now is proportionate to everything I was building toward.”},
{text:“I am not being overlooked — I am being prepared. The season in which my gifts were unrecognized was not a waste. It was building the kind of character that can carry the weight of what is coming.”},
{text:“What I have been faithful with in private is being rewarded in public. The work I did when no one was watching. The standards I maintained when there was no applause for it. That faithfulness is being seen by Someone who rewards it.”,ref:“Matthew 25:21”},
{text:“I am being promoted to positions that my experience alone does not fully account for. God is bridging the gap between where I am and where I am being sent. The promotion is happening because of His grace, not just my resume.”},
{text:“My gifts are creating opportunities that credentials, connections, and conventional pathways cannot explain. What I carry is rare enough and valuable enough that it bypasses the normal queue and goes directly to where it is most needed.”},
{text:“I receive promotion with genuine gratitude, with deep humility, and with the immediate commitment to steward it faithfully — knowing that every level of elevation comes with a corresponding increase in responsibility.”},
{text:“The table I once served at, I will one day be invited to preside over. The rooms I was once excluded from, I will one day walk into with authority. Not out of pride — but because this is how God writes the testimonies He is proud of.”},
{text:“I am being seen by the people who have the power and the willingness to open the next significant door in my life. My work has prepared me. My character has qualified me. My anointing has preceded me. I am ready to be found.”},
{text:“My time is now. Not in some vague future. Now. In this season, with this level of preparation, with this version of my gifts — something is shifting. I declare that the momentum of promotion is already moving in my direction.”},
{text:“Unexpected elevation is written into my testimony. The kind of advancement that surprises people who did not believe it was possible — including me. God takes great pleasure in promoting people in ways that make clear it was His hand doing the lifting.”},

// ── UTILS ──────────────────────────────────────────────────────────────────
function useTime() {
const [t, setT] = useState(new Date());
useEffect(() => { const id = setInterval(() => setT(new Date()), 1000); return () => clearInterval(id); }, []);
return t;
}

// ── APP ────────────────────────────────────────────────────────────────────
function App() {
const [view, setView] = useState(“categories”);
const [activeCat, setActiveCat] = useState(null);
const [activeSub, setActiveSub] = useState(null);
const [idx, setIdx] = useState(0);
const [animDir, setAnimDir] = useState(null);
const [animating, setAnimating] = useState(false);
const [declared, setDeclared] = useState(new Set());
const [search, setSearch] = useState(””);
const [islandState, setIslandState] = useState(“idle”);
const [rippling, setRippling] = useState(false);
const time = useTime();

const cards = activeSub ? activeSub.cards : [];
const card = cards[idx];
const cardKey = activeSub ? `${activeCat.key}-${activeSub.key}-${idx}` : “”;
const isDeclared = declared.has(cardKey);
const totalDeclared = declared.size;
const filtered = search ? ALL_CATEGORIES.filter(c => c.label.toLowerCase().includes(search.toLowerCase())) : ALL_CATEGORIES;

const currentBg = activeSub ? activeSub.bg : “linear-gradient(160deg,#1E1B4B 0%,#3730A3 40%,#6D28D9 70%,#A855F7 100%)”;
const currentAccent = activeSub ? activeSub.accent : “#E9D5FF”;
const currentAccentDim = activeSub ? activeSub.accentDim : “#C4B5FD”;
